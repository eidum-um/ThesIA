<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistente Virtual - EIDUM</title>
    <style>
        :root {
            --primary-color: #0056b3;
            --background-color: #f4f6f9;
            --chat-bg: #ffffff;
            --text-user: #ffffff;
            --bg-user: #0056b3;
            --bg-bot: #f0f2f5;
            --text-bot: #333333;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--background-color);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #chat-container {
            width: 100%;
            max-width: 500px;
            height: 85vh;
            background: var(--chat-bg);
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            background: var(--primary-color);
            color: white;
            padding: 15px 20px;
            font-size: 1.1rem;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #chat-box {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .msg {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .user-msg {
            background-color: var(--bg-user);
            color: var(--text-user);
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .bot-msg {
            background-color: var(--bg-bot);
            color: var(--text-bot);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .system-msg {
            background: #ffe3e3;
            color: #d63031;
            align-self: center;
            font-size: 0.85rem;
            border-radius: 6px;
        }

        #input-area {
            padding: 15px 20px;
            border-top: 1px solid #eeeeee;
            display: flex;
            gap: 10px;
            background: #ffffff;
        }

        #user-input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid #cccccc;
            border-radius: 20px;
            outline: none;
            font-size: 0.95rem;
        }

        #user-input:focus {
            border-color: var(--primary-color);
        }

        #send-btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }

        #send-btn:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

<div id="chat-container">
    <header>
        <span>Asistente Web Oficial EIDUM</span>
    </header>

    <div id="chat-box">
        <div class="msg bot-msg">¡Hola! Soy el asistente virtual de la Escuela Internacional de Doctorado. ¿En qué te puedo ayudar hoy basándome en la información de la web oficial?</div>
    </div>

    <div id="input-area">
        <input type="text" id="user-input" placeholder="Escribe tu consulta aquí..." onkeypress="evaluarEnter(event)">
        <button id="send-btn" onclick="enviarMensaje()">Enviar</button>
    </div>
</div>

<script>
    let fuenteConocimiento = [];

    window.onload = async () => {
        await cargarConocimiento();
    };

    function evaluarEnter(e) {
        if (e.key === 'Enter') enviarMensaje();
    }

    // Cargar el JSON generado por el Scraper de Python
    async function cargarConocimiento() {
        try {
            const res = await fetch('data.json');
            fuenteConocimiento = await res.json();
        } catch (error) {
            console.error("No se pudo cargar el archivo de conocimiento (data.json).", error);
        }
    }

    // Buscador optimizado para el plan gratuito de Groq (Evita superar límites de tokens)
    function construirContexto(preguntaUsuario) {
        let contextoRelevante = "";
        
        const normalizar = (texto) => texto.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
        const preguntaLimpia = normalizar(preguntaUsuario);

        // Extraemos raíces de palabras de más de 4 letras para la búsqueda rápida
        const palabrasClave = preguntaLimpia.split(" ")
            .filter(p => p.length > 4)
            .map(p => p.substring(0, 5));

        let bloquesEncontrados = 0;

        fuenteConocimiento.forEach(sitio => {
            const textoSitioLimpio = normalizar(sitio.texto);
            const coincide = palabrasClave.some(raiz => textoSitioLimpio.includes(raiz));
            
            // Limitamos a un máximo de 2 bloques web coincidentes para controlar el tamaño
            if (coincide && bloquesEncontrados < 2) {
                contextoRelevante += `[Fuente URL: ${sitio.url}]\nContenido:\n${sitio.texto}\n\n`;
                bloquesEncontrados++;
            }
        });

        // Si no encuentra coincidencia exacta, envía un fragmento básico muy reducido
        if (!contextoRelevante) {
            contextoRelevante = fuenteConocimiento.map(s => s.texto).join("\n\n").substring(0, 2500);
        } else {
            // Aseguramos que bajo ningún concepto el texto final exceda el límite de seguridad
            contextoRelevante = contextoRelevante.substring(0, 3000);
        }
        return contextoRelevante;
    }

    async function enviarMensaje() {
        const input = document.getElementById('user-input');
        const mensaje = input.value.trim();

        if (!mensaje) return;

        mostrarMensaje(mensaje, 'user-msg');
        input.value = '';

        const contexto = construirContexto(mensaje);

        try {
            mostrarMensaje("Pensando...", 'bot-msg', 'loading-msg');

            // Petición directa a tu Cloudflare Worker seguro
            const response = await fetch('https://bitter-bird-6c05.eidum.workers.dev', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    prompt: mensaje,
                    contexto: contexto
                })
            });

            const loading = document.getElementById('loading-msg');
            if (loading) loading.remove();

            if (!response.ok) {
                const textoError = await response.text();
                throw new Error(`Error del servidor Cloudflare (${response.status}): ${textoError}`);
            }

            const data = await response.json();
            
            // Validación estricta de la estructura JSON devuelta por Groq
            if (data && data.choices && data.choices[0] && data.choices[0].message) {
                const respuestaBot = data.choices[0].message.content;
                mostrarMensaje(respuestaBot, 'bot-msg');
            } else {
                console.error("Estructura de datos inesperada:", data);
                if (data.error) console.error("Detalle del error interno de Groq:", data.error.message);
                throw new Error("La respuesta del backend no contiene los bloques válidos esperados.");
            }

        } catch (error) {
            const loading = document.getElementById('loading-msg');
            if (loading) loading.remove();
            mostrarMensaje("Lo siento, en este momento no puedo procesar tu consulta. Por favor, inténtalo más tarde.", 'bot-msg');
            console.error("Error detallado en la petición:", error.message);
        }
    }

    function mostrarMensaje(texto, clase, idOpcional = null) {
        const chatBox = document.getElementById('chat-box');
        const div = document.createElement('div');
        div.className = `msg ${clase}`;
        if (idOpcional) div.id = idOpcional;
        div.innerText = texto;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }
</script>

</body>
</html>
