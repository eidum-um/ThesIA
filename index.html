<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistente Virtual - Conocimiento Cerrado</title>
    <style>
        :root {
            --primary-color: #0056b3;
            --background-color: #f4f6f9;
            --chat-bg: #ffffff;
            --text-user: #ffffff;
            --bg-user: #0056b3;
            --bg-bot: #f0f2f5;
            --text-bot: #333333;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--background-color);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #chat-container {
            width: 100%;
            max-width: 500px;
            height: 85vh;
            background: var(--chat-bg);
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            background: var(--primary-color);
            color: white;
            padding: 15px 20px;
            font-size: 1.1rem;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #config-btn {
            background: transparent;
            border: 1px solid white;
            color: white;
            border-radius: 4px;
            padding: 4px 8px;
            cursor: pointer;
            font-size: 0.8rem;
        }

        #config-panel {
            background: #fff3cd;
            padding: 10px 20px;
            display: none;
            border-bottom: 1px solid #ffeeba;
        }

        #config-panel input {
            width: 70%;
            padding: 5px;
            font-size: 0.85rem;
        }

        #chat-box {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .msg {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .user-msg {
            background-color: var(--bg-user);
            color: var(--text-user);
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .bot-msg {
            background-color: var(--bg-bot);
            color: var(--text-bot);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .system-msg {
            background: #ffe3e3;
            color: #d63031;
            align-self: center;
            font-size: 0.85rem;
            border-radius: 6px;
        }

        #input-area {
            padding: 15px 20px;
            border-top: 1px solid #eeeeee;
            display: flex;
            gap: 10px;
            background: #ffffff;
        }

        #user-input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid #cccccc;
            border-radius: 20px;
            outline: none;
            font-size: 0.95rem;
        }

        #user-input:focus {
            border-color: var(--primary-color);
        }

        #send-btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }

        #send-btn:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

<div id="chat-container">
    <header>
        <span>Asistente Web Oficial</span>
        <button id="config-btn" onclick="toggleConfig()">Configurar API</button>
    </header>

    <div id="config-panel">
        <label for="api-key" style="font-size: 0.85rem;">OpenAI API Key: </label>
        <input type="password" id="api-key" placeholder="sk-..." onchange="guardarKey()">
    </div>

    <div id="chat-box">
        <div class="msg bot-msg">¡Hola! Soy el asistente virtual. ¿En qué te puedo ayudar hoy basándome en la información de la web oficial?</div>
    </div>

    <div id="input-area">
        <input type="text" id="user-input" placeholder="Escribe tu consulta aquí..." onkeypress="evaluarEnter(event)">
        <button id="send-btn" onclick="enviarMensaje()">Enviar</button>
    </div>
</div>

<script>
    let fuenteConocimiento = [];

    // Cargar la API Key guardada si existe
    window.onload = async () => {
        if (localStorage.getItem('openai_key')) {
            document.getElementById('api-key').value = localStorage.getItem('openai_key');
        }
        await cargarConocimiento();
    };

    function toggleConfig() {
        const panel = document.getElementById('config-panel');
        panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
    }

    function guardarKey() {
        const key = document.getElementById('api-key').value.trim();
        localStorage.setItem('openai_key', key);
    }

    function evaluarEnter(e) {
        if (e.key === 'Enter') enviarMensaje();
    }

    // Cargar el JSON generado por el Scraper de Python
    async function cargarConocimiento() {
        try {
            const res = await fetch('data.json');
            fuenteConocimiento = await res.json();
        } catch (error) {
            console.error("No se pudo cargar el archivo de conocimiento (data.json).", error);
        }
    }

    // Buscador básico por palabras clave sobre los bloques de texto raspados
    function construirContexto(preguntaUsuario) {
        let contextoRelevante = "";
        const palabrasClave = preguntaUsuario.toLowerCase().split(" ").filter(p => p.length > 3);

        fuenteConocimiento.forEach(sitio => {
            // Si la pregunta comparte palabras con el texto de esa URL, añadimos el bloque
            const coincide = palabrasClave.some(palabra => sitio.texto.toLowerCase().includes(palabra));
            if (coincide) {
                contextoRelevante += `[Fuente URL: ${sitio.url}]\nContenido:\n${sitio.texto}\n\n`;
            }
        });

        // Si no hay match específico, limitamos el contexto a las primeras páginas por tamaño de tokens
        if (!contextoRelevante) {
            contextoRelevante = fuenteConocimiento.map(s => s.texto).join("\n\n").substring(0, 6000);
        }
        return contextoRelevante;
    }

    async function enviarMensaje() {
        const input = document.getElementById('user-input');
        const mensaje = input.value.trim();
        const apiKey = document.getElementById('api-key').value.trim();

        if (!mensaje) return;

        if (!apiKey) {
            mostrarMensaje("Por favor, introduce y configura tu OpenAI API Key arriba para poder responder.", 'system-msg');
            toggleConfig();
            return;
        }

        mostrarMensaje(mensaje, 'user-msg');
        input.value = '';

        const contexto = construirContexto(mensaje);

        // SYSTEM PROMPT: Garantiza el comportamiento de conocimiento cerrado
        const systemPrompt = `Eres un asistente virtual corporativo estricto y educado. Tu único objetivo es responder a las preguntas de los usuarios utilizando exclusivamente el contexto que se te proporciona a continuación.
        
        REGLAS CRÍTICAS:
        1. Responde solo con la información que encuentres de manera explícita en el contexto proporcionado.
        2. Si la respuesta no se encuentra en el contexto, debes contestar textualmente y sin añadir nada más: "Lo siento, solo puedo responder preguntas relacionadas con la información oficial disponible en la web."
        3. No inventes, no supongas, ni uses tu conocimiento externo bajo ningún concepto.
        
        Contexto oficial extraído de la web:
        ${contexto}`;

        try {
            mostrarMensaje("Pensando...", 'bot-msg', 'loading-msg');

            const response = await fetch('https://api.openai.com/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${apiKey}`
                },
                body: JSON.stringify({
                    model: "gpt-4o-mini",
                    messages: [
                        { role: "system", content: systemPrompt },
                        { role: "user", content: mensaje }
                    ],
                    temperature: 0.0 // Evita cualquier tipo de alucinación o creatividad
                })
            });

            // Eliminar el mensaje de "Pensando..."
            const loading = document.getElementById('loading-msg');
            if (loading) loading.remove();

            if (!response.ok) throw new Error("Error en la respuesta de la API");

            const data = await response.json();
            const respuestaBot = data.choices[0].message.content;
            mostrarMensaje(respuestaBot, 'bot-msg');

        } catch (error) {
            const loading = document.getElementById('loading-msg');
            if (loading) loading.remove();
            mostrarMensaje("Error al conectar con el servicio de IA. Verifica tu API Key.", 'bot-msg');
        }
    }

    function mostrarMensaje(texto, clase, idOpcional = null) {
        const chatBox = document.getElementById('chat-box');
        const div = document.createElement('div');
        div.className = `msg ${clase}`;
        if (idOpcional) div.id = idOpcional;
        div.innerText = texto;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }
</script>

</body>
</html>
