<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistente Virtual - EIDUM</title>
    <style>
        :root {
            --primary-color: #0056b3;
            --background-color: #f4f6f9;
            --chat-bg: #ffffff;
            --text-user: #ffffff;
            --bg-user: #0056b3;
            --bg-bot: #f0f2f5;
            --text-bot: #333333;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--background-color);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #chat-container {
            width: 100%;
            max-width: 500px;
            height: 85vh;
            background: var(--chat-bg);
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            background: var(--primary-color);
            color: white;
            padding: 15px 20px;
            font-size: 1.1rem;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #chat-box {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .msg {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .user-msg {
            background-color: var(--bg-user);
            color: var(--text-user);
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .bot-msg {
            background-color: var(--bg-bot);
            color: var(--text-bot);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .system-msg {
            background: #ffe3e3;
            color: #d63031;
            align-self: center;
            font-size: 0.85rem;
            border-radius: 6px;
        }

        #input-area {
            padding: 15px 20px;
            border-top: 1px solid #eeeeee;
            display: flex;
            gap: 10px;
            background: #ffffff;
        }

        #user-input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid #cccccc;
            border-radius: 20px;
            outline: none;
            font-size: 0.95rem;
        }

        #user-input:focus {
            border-color: var(--primary-color);
        }

        #send-btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }

        #send-btn:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

<div id="chat-container">
    <header>
        <span>Asistente Web Oficial EIDUM</span>
    </header>

    <div id="chat-box">
        <div class="msg bot-msg">¡Hola! Soy el asistente virtual de la Escuela Internacional de Doctorado. ¿En qué te puedo ayudar hoy basándome en la información de la web oficial?</div>
    </div>

    <div id="input-area">
        <input type="text" id="user-input" placeholder="Escribe tu consulta aquí..." onkeypress="evaluarEnter(event)">
        <button id="send-btn" onclick="enviarMensaje()">Enviar</button>
    </div>
</div>

<script>
    let fuenteConocimiento = [];

    window.onload = async () => {
        await cargarConocimiento();
    };

    function evaluarEnter(e) {
        if (e.key === 'Enter') enviarMensaje();
    }

    async function cargarConocimiento() {
        try {
            const res = await fetch('data.json');
            fuenteConocimiento = await res.json();
        } catch (error) {
            console.error("No se pudo cargar el archivo de conocimiento (data.json).", error);
        }
    }

    // Buscador avanzado por fragmentos semánticos completos
    function construirContexto(preguntaUsuario) {
        let párrafosCoincidentes = [];
        
        const normalizar = (texto) => texto.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
        const preguntaLimpia = normalizar(preguntaUsuario);

        // Extraemos palabras clave de búsqueda potentes (más de 4 letras)
        const palabrasClave = preguntaLimpia.split(" ")
            .filter(p => p.length > 4)
            .map(p => p.substring(0, 5)); // Usamos raíces semánticas (ej: "matri" para matrícula/matricularse)

        fuenteConocimiento.forEach(sitio => {
            // Troceamos el texto largo de la página web en párrafos reales usando puntos o espacios amplios
            const parrafos = sitio.texto.split(/(?<=\.)\s+/);
            
            parrafos.forEach(parrafo => {
                const parrafoLimpio = normalizar(parrafo);
                // Comprobamos el nivel de coincidencia de este párrafo con las palabras clave
                const coincidencias = palabrasClave.filter(raiz => parrafoLimpio.includes(raiz)).length;
                
                if (coincidencias > 0) {
                    párrafosCoincidentes.push({
                        score: coincidencias,
                        texto: `[Fuente: ${sitio.url}] ${parrafo.trim()}`
                    });
                }
            });
        });

        // Ordenamos los párrafos encontrados de mayor a menor relevancia
        párrafosCoincidentes.sort((a, b) => b.score - a.score);

        // Nos quedamos únicamente con los 4 mejores párrafos (completos e inteligentes)
        const mejoresParrafos = párrafosCoincidentes.slice(0, 4).map(p => p.texto);

        // Si no se encuentra nada coherente, enviamos un extracto general controlado de las páginas principales
        if (mejoresParrafos.length === 0) {
            return fuenteConocimiento.map(s => s.texto).join("\n").substring(0, 2000);
        }

        return mejoresParrafos.join("\n\n");
    }

    async function enviarMensaje() {
        const input = document.getElementById('user-input');
        const mensaje = input.value.trim();

        if (!mensaje) return;

        mostrarMensaje(mensaje, 'user-msg');
        input.value = '';

        const contexto = construirContexto(mensaje);

        try {
            mostrarMensaje("Pensando...", 'bot-msg', 'loading-msg');

            const response = await fetch('https://bitter-bird-6c05.eidum.workers.dev', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    prompt: mensaje,
                    contexto: contexto
                })
            });

            const loading = document.getElementById('loading-msg');
            if (loading) loading.remove();

            if (!response.ok) {
                const textoError = await response.text();
                throw new Error(`Error Cloudflare (${response.status}): ${textoError}`);
            }

            const data = await response.json();
            
            if (data && data.choices && data.choices[0] && data.choices[0].message) {
                const respuestaBot = data.choices[0].message.content;
                mostrarMensaje(respuestaBot, 'bot-msg');
            } else {
                throw new Error("Estructura de respuesta inválida.");
            }

        } catch (error) {
            const loading = document.getElementById('loading-msg');
            if (loading) loading.remove();
            mostrarMensaje("Lo siento, en este momento no puedo procesar tu consulta. Por favor, inténtalo más tarde.", 'bot-msg');
            console.error("Error:", error.message);
        }
    }

    function mostrarMensaje(texto, clase, idOpcional = null) {
        const chatBox = document.getElementById('chat-box');
        const div = document.createElement('div');
        div.className = `msg ${clase}`;
        if (idOpcional) div.id = idOpcional;
        div.innerText = texto;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }
</script>

</body>
</html>
